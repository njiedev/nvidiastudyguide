<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCA-GENL Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="nvidia-badge">NVIDIA</span>
    <h1>NCA-GENL Study Tracker</h1>
  </div>
  <div class="progress-bar-container">
    <div class="progress-ring">
      <svg viewBox="0 0 36 36">
        <circle class="bg" cx="18" cy="18" r="15.5"/>
        <circle class="fill" id="progressCircle" cx="18" cy="18" r="15.5"
          stroke-dasharray="97.4" stroke-dashoffset="97.4"/>
      </svg>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</div>

<nav class="nav" id="nav"></nav>

<div class="container" id="content"></div>

<script src="script.js"></script>
</body>
</html>
